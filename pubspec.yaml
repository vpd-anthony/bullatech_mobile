name: bullatech
description: The app is used by the Technical Department to track, manage, and optimize washing service operations in real time.
publish_to: 'none'

#always +1 on version number when updating the app on the app stores
version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  dio: 5.4.3+1
  flutter_dotenv: 5.2.1
  flutter_riverpod: 2.4.9
  flutter_hooks: 0.20.3
  flutter_secure_storage: 9.0.0
  freezed_annotation: 2.4.1
  riverpod_annotation: 2.1.5
  go_router: 12.1.1
  intl: 0.18.1
  shared_preferences: 2.2.2
  flutter_svg: 2.0.9
  image_picker: 1.0.8
  mask_text_input_formatter: 2.9.0
  json_annotation: 4.8.1
  qr_flutter: 4.1.0
  path_provider: 2.1.1
  permission_handler: 11.0.1
  ai_barcode_scanner: 3.4.1
  google_mlkit_barcode_scanning: 0.10.0
  local_auth: 2.1.8
  icons_plus: 5.0.0
  data_table_2: 2.5.12
  table_calendar: 3.0.9
  html: 0.15.4
  flutter_local_notifications: 18.0.1
  image_gallery_saver2_fixed: 2.0.9
  uuid: 3.0.7
  device_info_plus: 9.0.2
  web_socket_channel: 2.4.0
  http: 1.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10

  # UI
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  gap: ^3.0.1

  # Utilities
  logger: ^2.0.2+1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: 2.4.9
  flutter_lints: 3.0.1
  freezed: 2.3.5
  json_serializable: 6.7.1
  riverpod_generator: 2.2.3
  riverpod_lint: 1.3.2
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true
  assets:
  - .env
  - assets/images/
  - assets/svgs/

  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-Regular.ttf
        - asset: assets/fonts/InterTight-Bold.ttf
          weight: 700